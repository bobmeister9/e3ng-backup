[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(55)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
    M140 S{BED_TEMP} ; Start bed heating
    M104 S{EXTRUDER_TEMP} ; Start nozzle heating
    G90 ; Use absolute coordinates
    G28 ; Home the printer
    M109 S{EXTRUDER_TEMP} ; Wait for nozzle to reach temperature
    M190 S{BED_TEMP} ; Wait for bed to reach temperature
    #WIPE_NOZZLE
    BED_MESH_PROFILE LOAD=default ; Perform bed mesh calibration
    G1 Z10.0 F3000 ; Move Z Axis up little to prevent scratching of Heat Bed
    G1 X1 Y20 Z0.3 F5000.0 ; Move to start position
    G1 X1 Y200.0 Z0.3 F1500.0 E15 ; Draw the first line
    G1 X1.3 Y200.0 Z0.3 F5000.0 ; Move to side a little
    G1 X1.3 Y20 Z0.3 F1500.0 E30 ; Draw the second line
    G92 E0 ; Reset Extruder
    G1 Z2.0 F3000 ; Move Z Axis up little to prevent scratching of Heat Bed
    G1 X5 Y20 Z0.3 F5000.0 ; Move over to prevent blob squish

[gcode_macro END_PRINT]
gcode:
    #M140 S0
    #M104 S0
    G91    ; use relative coordinates
    G0 Z10 ; Move up 10mm
    G90    ; use absolute coordinates
    G0 X0 Y220
    #{if max_layer_z < printable_height}G1 Z{min(max_layer_z+2, printable_height)} F600 ; Move print head up{endif}
    #G1 X5 Y{print_bed_max[1]*0.8} F{travel_speed*60} ; present print
    #{if max_layer_z < printable_height-10}G1 Z{min(max_layer_z+70, printable_height-10)} F600 ; Move print head further up{endif}
    #{if max_layer_z < printable_height*0.6}G1 Z{printable_height*0.6} F600 ; Move print head further up{endif}
    G92 E0 ; Reset Extruder
    M140 S0 ; turn off heatbed
    M104 S0 ; turn off temperature
    M107 ; turn off fan
    M84 X Y E ; disable motors

[gcode_macro PRINT_END]
gcode:
    END_PRINT

[gcode_macro UNLOAD_FILAMENT]
gcode:
    M109 S200
    G1 E-100 F500
    G90
    G92

[gcode_macro WIPE_NOZZLE]
gcode:
    G90    ; use absolute coordinates
    G0 X220 Y100 F1500
    G0 Z5
    G0 X248 Y100
    G0 X225 Y100

    G0 X248 Y100
    G0 X225 Y100

    G0 X248 Y100
    G0 X225 Y100

    G0 Z10
    
[pause_resume]

[gcode_macro M0]
gcode:
    PAUSE

######################################################################
## Filament Change ##
######################################################################
# M600: Filament Change. This macro will pause the printer, move the
# tool to the change position, and retract the filament 130mm. Adjust
# the retraction settings for your own extruder. After filament has
# been changed, simply resume the print.

# Trying to use T0-T4 as M600 macro (if more than 5 material colors, add more here)
[gcode_macro T0]
gcode:
  M600
[gcode_macro T1]
gcode:
  M600
[gcode_macro T2]
gcode:
  M600
[gcode_macro T3]
gcode:
  M600
[gcode_macro T4]
gcode:
  M600
[gcode_macro M600]
########### Gcode ############
gcode:
  {% set X = params.X|default(printer.configfile.config["stepper_x"]["position_endstop"]|string)|int %}
  {% set Y = params.Y|default(printer.configfile.config["stepper_y"]["position_endstop"]|string)|int %}
  {% set Z = params.Z|default(10)|int %}
  {% set E = params.E|default(-20)|int %}
  {% set tool = params.tool|default(0)|int %}
  PAUSE
  G91
  G1 E-5 F4000
  G1 Z{Z}
  G90
  G1 X{X} Y{Y} F3000 ;park position
  G0 E10 F500 ;extrude filament to get better blob on end
  G0 E{E} F600 ;retract additional filament to move out of melt zone
  G92 E0

[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True